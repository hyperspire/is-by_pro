<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <base target="_parent">
    <link rel="stylesheet" type="text/css" href="/css/is-by.css?v=7">
    <script src="/js/is-by_user.js?v=8" type="text/javascript"></script>
    <style>
        body,
        html {
            background-color: transparent !important;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .post {
            margin: 0 !important;
            border: none !important;
        }

        .post-actions,
        .acknowledged-count {
            display: none !important;
        }
    </style>
</head>

<body>
    {{ single_post_html | safe }}
    <script>
        // Resize iframe to content height
        window.addEventListener('load', function () {
            if (window.parent) {
                var height = document.body.scrollHeight;
                window.parent.postMessage({ type: 'resize', height: height, id: '{{ iframe_id }}' }, '*');
            }
        });
    </script>
</body>

</html>
